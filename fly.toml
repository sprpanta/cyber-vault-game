# fly.toml configuration for cyber-vault-game

app = "cyber-vault-game"
primary_region = "ams"

[build]
  # Fly.io will auto-detect your Dockerfile

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  # Add environment variables here if needed
  # Example: API_KEY = "your-key"
